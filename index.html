<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Pembelajaran Interaktif</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === CSS RESET & DASAR === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #1a1a2e; }

        /* === CONTAINER UTAMA (Ratio 16:9) === */
        #app-container {
            width: 100%; max-width: 1280px; aspect-ratio: 16 / 9;
            position: relative; overflow: hidden; background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .bg-page1 { background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1280&auto=format&fit=crop'); }
        .bg-page2 { background-image: url('https://i.imgur.com/K3pW1sE.jpeg'); }

        button:not(:disabled):active { transform: scale(0.92) !important; filter: brightness(0.8); }

        #btnSound {
            position: absolute; top: 20px; right: 20px; z-index: 50; width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.9); border: 2px solid #27ae60; color: #27ae60; font-size: 20px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: transform 0.2s, background 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #btnSound:hover { background: #27ae60; color: white; transform: scale(1.1); }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }
        .hidden { opacity: 0; pointer-events: none; z-index: -1; }
        .active { opacity: 1; pointer-events: auto; z-index: 10; }

        .login-box { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 400px; }
        .login-box h1 { margin-bottom: 20px; color: #333; font-weight: 800; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        
        button.btn-utama {
            width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: white;
            background: linear-gradient(to right, #4CAF50, #2E7D32); border: none; border-radius: 10px;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        button.btn-utama:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }
        button.btn-utama:not(:disabled):hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6); }

        .header-info { position: absolute; top: 20px; left: 20px; color: white; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.3); z-index: 5;}
        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .node-btn {
            position: absolute; transform: translate(-50%, -50%); width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; border: 3px solid white;
            cursor: pointer; transition: transform 0.2s, background 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2;
        }
        .node-btn .tooltip {
            position: absolute; bottom: -40px; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 8px; font-size: 14px;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.3s; font-weight: bold;
        }
        .node-btn:hover .tooltip { opacity: 1; bottom: -45px; }

        .node-btn.completed { background: linear-gradient(135deg, #4CAF50, #2E7D32); } 
        .node-btn.locked { background: linear-gradient(135deg, #c0392b, #8e44ad); cursor: not-allowed; } 
        .node-btn.active-node { background: linear-gradient(135deg, #f1c40f, #f39c12); animation: pulse-yellow 1.5s infinite; border-color: #fff; }
        @keyframes pulse-yellow { 0% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(241, 196, 15, 0); } 100% { box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); } }

        /* === MODAL KONTEN === */
        #modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #333; backdrop-filter: blur(5px);
        }
        .modal-content { 
            position: relative; background: white; padding: 40px 30px 30px 30px; border-radius: 20px; 
            text-align: center; max-width: 1000px; width: 95%; max-height: 95vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .btn-kembali { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #e74c3c; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .btn-kembali:hover { transform: scale(1.2); }
        .modal-content h2 { margin-bottom: 15px; color: #2c3e50; font-size: 24px; }
        
        .media-container { margin-bottom: 20px; background: #f4f4f4; border-radius: 10px; overflow: hidden; padding: 15px; border: 1px solid #ddd; }
        audio { width: 100%; outline: none; margin-top: 10px;}
        
        /* === WADAH SLIDE GAMBAR (BARU) === */
        .slide-box { 
            /* Memberikan ruang yang proporsional (16:9 mirip layar laptop) */
            height: 50vh; min-height: 400px; 
            display: flex; justify-content: center; align-items: center; 
            background: #222; /* Latar gelap agar gambar slide cerah menonjol */
            border-radius: 10px; padding: 10px; margin-bottom: 15px; overflow: hidden;
        }
        /* Memastikan gambar slide tidak penyok, mempertahankan rasionya */
        .slide-box img { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-radius: 5px;}
        
        .slide-controls { display: flex; justify-content: space-between; align-items: center; background: #eee; padding: 10px; border-radius: 10px; border: 1px solid #ccc;}
        .btn-mini { padding: 8px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-mini:hover:not(:disabled) { background: #2980b9; }
        .btn-mini:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* === WADAH ARTIKEL PENGGANTI VIDEO (BARU) === */
        .article-box {
            height: 50vh; min-height: 400px; overflow-y: auto; text-align: left;
            background: #fff; padding: 25px; border: 1px solid #ccc; border-radius: 10px;
            font-size: 18px; line-height: 1.8; color: #444; margin-bottom: 15px;
            /* Scrollbar Kustom agar rapi */
            scrollbar-width: thin; scrollbar-color: #3498db #eee;
        }
        .article-box::-webkit-scrollbar { width: 10px; }
        .article-box::-webkit-scrollbar-track { background: #eee; border-radius: 10px;}
        .article-box::-webkit-scrollbar-thumb { background-color: #3498db; border-radius: 10px; }

        .article-box img { max-width: 100%; border-radius: 8px; margin: 15px 0; border: 1px solid #eee; }
        
        .warning-text { font-size: 14px; color: #e74c3c; margin-bottom: 15px; font-style: italic; }
    </style>
</head>
<body>

    <audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" loop preload="auto"></audio>
    <audio id="sfx-click-source" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b8f845d6.mp3?filename=pop-39222.mp3" preload="auto" style="display:none;"></audio>
    <audio id="sfx-success-source" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3" preload="auto" style="display:none;"></audio> 

    <div id="app-container" class="bg-page1">
        <button id="btnSound" title="Matikan/Nyalakan Suara"><i class="fas fa-volume-up"></i></button>

        <div id="page1" class="page active">
            <div class="login-box">
                <h1>Petualangan Sifat Cahaya!</h1>
                <div class="input-group">
                    <label>Nama Petualang</label>
                    <input type="text" id="inputNama" placeholder="Ketik nama kamu...">
                </div>
                <div class="input-group">
                    <label>Asal Sekolah</label>
                    <input type="text" id="inputSekolah" placeholder="Ketik asal sekolah...">
                </div>
                <button id="btnMulai" class="btn-utama" disabled>MULAI BERMAIN</button>
            </div>
        </div>

        <div id="page2" class="page hidden">
            <div class="header-info" id="user-info"><i class="fas fa-user-astronaut"></i> Halo, -</div>
            <div id="map-container"></div>
        </div>

        <div id="modal" class="hidden">
            <div class="modal-content">
                <button id="btnKembali" class="btn-kembali" title="Tutup dan Kembali"><i class="fas fa-times"></i></button>
                <h2 id="modal-title">Judul Materi</h2>
                
                <div id="dynamic-content"></div>
                
                <p id="warning-msg" class="warning-text">Selesaikan aktivitas di atas untuk melanjutkan!</p>
                <button id="btnSelesaiMateri" class="btn-utama" disabled>Tandai Selesai <i class="fas fa-check-circle"></i></button>
            </div>
        </div>
    </div>

    <script>
        const appContainer = document.getElementById('app-container');
        const page1 = document.getElementById('page1'), page2 = document.getElementById('page2');
        const inputNama = document.getElementById('inputNama'), inputSekolah = document.getElementById('inputSekolah');
        const btnMulai = document.getElementById('btnMulai'), userInfo = document.getElementById('user-info');
        const mapContainer = document.getElementById('map-container'), btnSound = document.getElementById('btnSound');
        
        const bgm = document.getElementById('bgm');
        const modal = document.getElementById('modal'), modalTitle = document.getElementById('modal-title');
        const dynamicContent = document.getElementById('dynamic-content'), warningMsg = document.getElementById('warning-msg');
        const btnSelesaiMateri = document.getElementById('btnSelesaiMateri'), btnKembali = document.getElementById('btnKembali');

        const clickSource = document.getElementById('sfx-click-source');
        const successSource = document.getElementById('sfx-success-source');

        // === STRUKTUR DATA MATERI BARU (TANPA VIDEO) ===
        const materiList = [
            { id: 0, type: 'info', title: "Panduan", x: 55, y: 85, desc: "Selamat datang di Pulau Petualangan! Ikuti jejak putus-putus dan selesaikan semua rintangan." },
            
            // TIPE BARU: Artikel untuk menggantikan Video
            // Anda bisa memasukkan tag <img> (termasuk .gif) dan <p> sebanyak yang Anda mau di dalam kontenArtikel
            { 
                id: 1, type: 'artikel', title: "Eksplorasi Konsep Dasar", x: 37, y: 72, 
                kontenArtikel: `
                    <h3>Pengertian Cahaya</h3>
                    <p>Cahaya adalah energi berbentuk gelombang elektromagnetik yang kasat mata dengan panjang gelombang sekitar 380–750 nm.</p>
                    <img src="https://images.unsplash.com/photo-1550853024-fae8cd4be47f?q=80&w=600&auto=format&fit=crop" alt="Prisma">
                    <h3>Sifat-Sifat Cahaya</h3>
                    <ul>
                        <li>Merambat lurus.</li>
                        <li>Dapat dipantulkan (Refleksi).</li>
                        <li>Dapat dibiaskan (Refraksi).</li>
                        <li>Dapat diuraikan (Dispersi).</li>
                    </ul>
                    <p><i>(Tarik layar terus ke bawah untuk menandai bahwa kamu sudah membacanya).</i></p>
                    <br><br><br><br>
                    <p style="text-align:center; font-weight:bold; color:#27ae60;">Akhir dari materi.</p>
                `
            },
            
            // Pastikan Anda mengubah src-nya nanti jika sudah menggunakan audio lokal (misal: "audio/podcast1.mp3")
            { id: 2, type: 'audio', title: "Eksplorasi Konsep Audio", x: 42, y: 52, fileSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            
            // TIPE SLIDE GAMBAR:
            // Masukkan link gambar dari folder lokal Anda (contoh: "img/slide1.jpg")
            // Saya menggunakan gambar dari Unsplash sebagai contoh/dummy
            { 
                id: 3, type: 'slide', title: "Eksplorasi Konsep Slide", x: 25, y: 48, 
                slides: [
                    "https://images.unsplash.com/photo-1518640467707-6811f4a6ab73?w=800&auto=format&fit=crop", 
                    "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&auto=format&fit=crop", 
                    "https://images.unsplash.com/photo-1550853024-fae8cd4be47f?w=800&auto=format&fit=crop"
                ] 
            },
            
            { id: 4, type: 'lab_maya', title: "Lab Maya: Simulasi Cahaya", x: 22, y: 25, fileSrc: "labmaya.html" },
            { id: 5, type: 'iframe_kuis', title: "Uji Kompetensi 1", x: 49, y: 21, fileSrc: "tnf.html" },
            { id: 6, type: 'iframe_kuis', title: "Uji Kompetensi 2", x: 75, y: 15, fileSrc: "pkg.html" },
            { id: 7, type: 'iframe_kuis', title: "Uji Kompetensi 3", x: 92, y: 15, fileSrc: "count.html" }
        ];

        let currentProgress = 0; let activeNodeId = null;

        window.addEventListener('message', function(event) {
            if (event.data && event.data.status) {
                if (event.data.status === 'kuis_lulus') {
                    btnSelesaiMateri.disabled = false;
                    warningMsg.innerText = "Selamat! Anda lulus kuis ini. Silakan klik tombol Selesai.";
                    warningMsg.style.color = "#27ae60"; 
                } else if (event.data.status === 'kuis_gagal') {
                    btnSelesaiMateri.disabled = true;
                    warningMsg.innerText = "Nilai belum mencapai KKM. Silakan coba lagi!";
                    warningMsg.style.color = "#e74c3c"; 
                }
            }
        });

        function playVirtualSound(type) {
            let clone = (type === 'success') ? successSource.cloneNode() : clickSource.cloneNode();
            clone.volume = 1.0; clone.play().catch(e => {});
        }

        document.addEventListener('click', function(event) {
            const targetBtn = event.target.closest('button');
            if (targetBtn) {
                if (targetBtn.id === 'btnSelesaiMateri' && !targetBtn.disabled) playVirtualSound('success');
                else if (!targetBtn.disabled) playVirtualSound('click');
            }
        });

        btnSound.addEventListener('click', () => {
            if(bgm.paused) { bgm.play(); btnSound.innerHTML = '<i class="fas fa-volume-up"></i>'; } 
            else { bgm.pause(); btnSound.innerHTML = '<i class="fas fa-volume-mute"></i>'; }
        });
        inputNama.addEventListener('input', () => { if(bgm.paused && btnSound.innerHTML.includes('fa-volume-up')) bgm.play().catch(e => {}); });

        function transitionBGM() {
            if(bgm.paused) return; 
            let vol = 1.0;
            const fadeOut = setInterval(() => {
                vol -= 0.1; bgm.volume = Math.max(0, vol);
                if (vol <= 0.2) {
                    clearInterval(fadeOut);
                    const fadeIn = setInterval(() => { vol += 0.1; bgm.volume = Math.min(1, vol); if (vol >= 1.0) clearInterval(fadeIn); }, 150);
                }
            }, 100);
        }

        function checkForm() { btnMulai.disabled = !(inputNama.value.trim() !== '' && inputSekolah.value.trim() !== ''); }
        inputNama.addEventListener('input', checkForm); inputSekolah.addEventListener('input', checkForm);

        btnMulai.addEventListener('click', () => {
            transitionBGM();
            userInfo.innerHTML = `<i class="fas fa-user-graduate"></i> ${inputNama.value} | ${inputSekolah.value}`;
            page1.classList.remove('active'); page1.classList.add('hidden');
            appContainer.classList.remove('bg-page1'); appContainer.classList.add('bg-page2');
            setTimeout(() => { page2.classList.remove('hidden'); page2.classList.add('active'); renderMap(); }, 800);
        });

        function renderMap() {
            mapContainer.innerHTML = ''; 
            materiList.forEach((materi, index) => {
                const btn = document.createElement('button'); btn.classList.add('node-btn');
                btn.style.left = `${materi.x}%`; btn.style.top = `${materi.y}%`;

                const tooltip = document.createElement('span'); tooltip.classList.add('tooltip'); tooltip.innerText = materi.title; btn.appendChild(tooltip);

                if (index < currentProgress) { btn.classList.add('completed'); btn.innerHTML += `<i class="fas fa-star"></i>`; } 
                else if (index === currentProgress) { btn.classList.add('active-node'); btn.innerHTML += `<i class="fas fa-angle-double-down"></i>`; } 
                else { btn.classList.add('locked'); btn.innerHTML += `<i class="fas fa-lock"></i>`; btn.disabled = true; }

                btn.addEventListener('click', () => bukaMateri(index)); mapContainer.appendChild(btn);
            });
        }

        function bukaMateri(id) {
            activeNodeId = id; const data = materiList[id];
            modalTitle.innerText = data.title;
            dynamicContent.innerHTML = ''; 
            btnSelesaiMateri.disabled = true; 
            warningMsg.style.display = "block";
            
            if(!bgm.paused) bgm.volume = 0.1; 

            // 1. INFO
            if (data.type === 'info') {
                dynamicContent.innerHTML = `<p style="color:#555; font-size:18px;">${data.desc}</p>`;
                btnSelesaiMateri.disabled = false; warningMsg.style.display = "none";
            }
            // 2. TIPE ARTIKEL (Pengganti Video)
            else if (data.type === 'artikel') {
                warningMsg.innerText = "Gulir/Scroll bacaan sampai ke bawah untuk melanjutkan.";
                
                const artContainer = document.createElement('div');
                artContainer.className = 'article-box';
                artContainer.innerHTML = data.kontenArtikel;
                dynamicContent.appendChild(artContainer);

                // Logika agar tombol aktif ketika sudah di-scroll sampai bawah
                artContainer.addEventListener('scroll', () => {
                    // Cek jika posisi scroll sudah mencapai mentok bawah (toleransi 5 pixel)
                    if (artContainer.scrollTop + artContainer.clientHeight >= artContainer.scrollHeight - 5) {
                        btnSelesaiMateri.disabled = false; 
                        warningMsg.innerText = "Bagus, kamu telah membaca materinya. Silakan lanjut!"; 
                        warningMsg.style.color = "#27ae60";
                    }
                });
            }
            // 3. AUDIO
            else if (data.type === 'audio') {
                warningMsg.innerText = "Dengarkan audio sampai habis untuk melanjutkan";
                const audContainer = document.createElement('div'); audContainer.className = 'media-container';
                audContainer.innerHTML = `<i class="fas fa-headphones-alt" style="font-size:40px; color:#3498db; margin-bottom:15px;"></i><br>
                                          <audio id="materi-aud" controls><source src="${data.fileSrc}" type="audio/mpeg">Browser Anda tidak mendukung audio.</audio>`;
                dynamicContent.appendChild(audContainer);
                document.getElementById('materi-aud').addEventListener('ended', () => {
                    btnSelesaiMateri.disabled = false; warningMsg.innerText = "Audio selesai. Silakan lanjut!"; warningMsg.style.color = "#27ae60";
                });
            }
            // 4. SLIDE (Sekarang berbasis Tag <img src="">)
            else if (data.type === 'slide') {
                warningMsg.innerText = "Buka seluruh gambar slide untuk melanjutkan";
                let currentSlide = 0;
                
                // Menampilkan gambar berdasarkan array dari materiList
                const slideHTML = `
                    <div style="background:none; border:none; padding:0;">
                        <div id="slide-viewer" class="slide-box">
                            <img src="${data.slides[0]}" alt="Slide ${currentSlide + 1}">
                        </div>
                        <div class="slide-controls">
                            <button id="btnPrev" class="btn-mini" disabled><i class="fas fa-chevron-left"></i> Sebelumnya</button>
                            <span style="color:#333; font-weight:bold;" id="slide-indicator">1 / ${data.slides.length}</span>
                            <button id="btnNext" class="btn-mini">Selanjutnya <i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>`;
                dynamicContent.innerHTML = slideHTML;

                const btnPrev = document.getElementById('btnPrev');
                const btnNext = document.getElementById('btnNext');

                btnPrev.addEventListener('click', () => { 
                    if(currentSlide > 0) { currentSlide--; updateSlide(); } 
                });
                btnNext.addEventListener('click', () => {
                    if(currentSlide < data.slides.length - 1) { 
                        currentSlide++; updateSlide(); 
                        if(currentSlide === data.slides.length - 1) {
                            btnSelesaiMateri.disabled = false; 
                            warningMsg.innerText = "Kamu sudah melihat semua slide. Silakan lanjut!"; 
                            warningMsg.style.color = "#27ae60";
                        }
                    }
                });
                
                function updateSlide() {
                    document.getElementById('slide-viewer').innerHTML = `<img src="${data.slides[currentSlide]}" alt="Slide ${currentSlide + 1}">`;
                    document.getElementById('slide-indicator').innerText = `${currentSlide + 1} / ${data.slides.length}`;
                    
                    // Menonaktifkan tombol kembali jika di halaman pertama
                    btnPrev.disabled = (currentSlide === 0);
                    // Menonaktifkan tombol lanjut jika di halaman terakhir
                    btnNext.disabled = (currentSlide === data.slides.length - 1);
                }
            }
            // 5. LAB MAYA
            else if (data.type === 'lab_maya') {
                warningMsg.innerText = "Silakan bereksperimen. Klik tombol selesai jika sudah paham.";
                warningMsg.style.color = "#3498db";
                const iframeContainer = document.createElement('div');
                iframeContainer.className = 'media-container';
                iframeContainer.style.padding = "0"; iframeContainer.style.height = "70vh"; 
                iframeContainer.innerHTML = `<iframe src="${data.fileSrc}" style="width:100%; height:100%; border:none;"></iframe>`;
                dynamicContent.appendChild(iframeContainer);
                btnSelesaiMateri.disabled = false; 
            }
            // 6. KUIS
            else if (data.type === 'iframe_kuis') {
                warningMsg.innerText = "Jawab Kuis di atas dengan benar untuk membuka kunci!";
                warningMsg.style.color = "#e74c3c";
                const iframeContainer = document.createElement('div');
                iframeContainer.className = 'media-container';
                iframeContainer.style.padding = "0"; iframeContainer.style.height = "400px";
                iframeContainer.innerHTML = `<iframe src="${data.fileSrc}" style="width:100%; height:100%; border:none;"></iframe>`;
                dynamicContent.appendChild(iframeContainer);
                btnSelesaiMateri.disabled = true; 
            }

            modal.classList.remove('hidden'); modal.classList.add('active');
        }

        btnKembali.addEventListener('click', () => {
            if(!bgm.paused) bgm.volume = 1.0; 
            dynamicContent.innerHTML = ''; 
            modal.classList.remove('active'); modal.classList.add('hidden');
        });

        btnSelesaiMateri.addEventListener('click', () => {
            if(!bgm.paused) bgm.volume = 1.0; 
            dynamicContent.innerHTML = ''; 
            modal.classList.remove('active'); modal.classList.add('hidden');

            if (activeNodeId === currentProgress) {
                currentProgress++; renderMap(); 
            }
        });

    </script>
</body>
</html>
